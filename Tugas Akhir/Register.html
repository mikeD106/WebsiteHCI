    <link rel="stylesheet" href="./css/register.css">
    
</head>
<body>
    <div class="header">
        <div>
            <a class="title" href="./Home.html"><h2 class="storeName">Bulan Store</h2></a>
        </div>

        <div class="topnav" id="myTopnav">
            <a href="./Home.html">Home</a>
            
            <div class="dropdown"">
                <button class="dropbtn">Category
                    <i></i>
                </button>
                    
                <div class="dropdown-content" >
                    <a href="#">Men</a>
                    <a href="#">Women</a>
                </div>
            </div>

            <a href="./Register.html"  class="active"">Register</a>
            <a href="./AboutUs.html">About Us</a>
        </div>
    </div>
    
    <div class="main-body">
        <fieldset class="reg-form">
        
            <h3><b>Join Bulan Community Now!</b></h3>
            
            <img src="./assets/Logo.jpg" alt="Logo" height="175px" width="175px">

            <form action="./Home.html" style="padding: 10px;" onsubmit="validateForm(event)">
                <label class="email"><b>Email</b></label><br>
                <input required type="email" name="email" id="email" placeholder="Enter Email"><br><br>

                <label class="username""><b>Username</b></label><br>
                <input required type="text" name="Username" id="Username" placeholder="Enter Username"><br><br>

                <Label class="password"><b>Password</b></Label><br>
                <input required type="password" name="password" id="password" placeholder="Password"><br><br>

                <label class="re-password"><b>Confirm Password</b></label><br>
                <input required type="password" name="conf_password" id="conf_password" placeholder="Confirm Password"><br><br>
                
                <b>If you click "Register Now!" you will be registered and you agree to Bulan's <a href="./ToSPP.html">Terms of service</a> and <a href="./ToSPP.html">Privacy policy</a>.</b>
                <br><input class="reg-button" type="submit" value="Register Now!" id="submit-btn">
            </form>
        
        </fieldset>
    </div>

    <!-- Footer section -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-subcontainer">
                    
                <div>
                    <h4 class="copyright">Copyright © Bulan Corp. 2020. All Rights Reserved.</h4>
                </div>
        
                <div class="social-media">

                    <a href="https://twitter.com/Opacite101"><img class="insta" src="./assets/twitter.png" alt="" width="30px" height="30px"></a>
                    <a href="https://www.instagram.com/alexndrmichael/"><img class="twitter" src="./assets/instagram.jpg" alt="" width="30px" height="30px"></a>
                </div>
            </div>
        </div>
    </footer>
